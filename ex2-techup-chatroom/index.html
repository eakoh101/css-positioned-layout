<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <!-- Start coding here กล่องหลัก container-->
  <div class="container">

    <!-- กล่อง header-->
    <div class="header-box">
      <h1 class="font-header">Techup Chatroom </h1>
    </div>

    <!-- กล่องย่อย 1-->
    <div class="box1">
      <h3 class="font-sub">😍</h3>
    </div>

    <!-- กล่องย่อย 2-->
     <div class="box2">
      <h3 class="font-sub">🙈</h3>
    </div>

    <!-- กล่องย่อย 3-->
     <div class="box3">
      <h3 class="font-sub">สวัสดีจ้า</h3>
    </div>

    <!-- กล่องย่อย 4-->
     <div class="box4">
      <h3 class="font-sub">Coding สนุกจังเลย</h3>
      <div class="cross-mark">⨯</div>
    </div>

    <!-- กล่องย่อย 5-->
    <div class="box5">
      <h3 class="font-sub">😘💕</h3>
    </div>

  </div>
</body>

</html>
